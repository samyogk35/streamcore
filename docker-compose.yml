services:

  nginx:
    container_name: sc2-nginx
    image: nginx:latest
    ports:
      - "${NGINX_PORT}:7700"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - app1
      - app2
      - app3
    networks:
      - streamcore-network

  frontend:
    container_name: sc2-frontend
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NGINX_ENV=${NGINX_ENV}
        - NGINX_HOST=${NGINX_HOST}
        - NGINX_PORT=${NGINX_PORT}
    env_file:
      - .env
    networks:
      - streamcore-network

  app1:
    container_name: sc2-app1
    build: .
    env_file:
      - .env
    environment:
      - SERVER_NAME=Node-1
      - REDIS_PORT=6379
      - KAFKA_PORT=9092
      - POSTGRES_PORT=5432
    networks:
      - streamcore-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  app2:
    container_name: sc2-app2
    build: .
    env_file:
      - .env
    environment:
      - SERVER_NAME=Node-2
      - REDIS_PORT=6379
      - KAFKA_PORT=9092
      - POSTGRES_PORT=5432
    networks:
      - streamcore-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  app3:
    container_name: sc2-app3
    build: .
    env_file:
      - .env
    environment:
      - SERVER_NAME=Node-3
      - REDIS_PORT=6379
      - KAFKA_PORT=9092
      - POSTGRES_PORT=5432
    networks:
      - streamcore-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    container_name: sc2-postgres
    image: postgres:14
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - streamcore-network

  redis:
    container_name: sc2-redis
    image: redis
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - streamcore-network

  zookeeper:
    container_name: sc2-zookeeper
    image: confluentinc/cp-zookeeper:7.6.0
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - streamcore-network

  kafka:
    container_name: sc2-kafka
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - streamcore-network

  alpaca-feed:
    container_name: sc2-alpaca-feed
    build:
      context: ./alpaca-feed
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_PORT=6379
      - KAFKA_PORT=9092
      # Set ALPACA_MOCK=true in .env to generate synthetic ticks without
      # real Alpaca credentials.  ALPACA_MOCK_RATE controls ticks/sec per
      # symbol (default 5).  ALPACA_API_KEY/SECRET are not required in mock
      # mode.
      - ALPACA_MOCK=${ALPACA_MOCK:-false}
      - ALPACA_MOCK_RATE=${ALPACA_MOCK_RATE:-5}
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - streamcore-network

  kafka-consumer:
    container_name: sc2-kafka-consumer
    build:
      context: ./kafka-consumer
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - KAFKA_PORT=9092
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      zookeeper:
        condition: service_started
    networks:
      - streamcore-network

volumes:
  postgres_data:

networks:
  streamcore-network:
    driver: bridge
