version: '2.1'
services:

  nginx:
    container_name: sc2-nginx
    image: nginx:latest
    ports:
      - "${NGINX_PORT}:7700"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - app1
      - app2
      - app3
    networks:
      - streamcore-network

  frontend:
    container_name: sc2-frontend
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NGINX_ENV=${NGINX_ENV}
        - NGINX_HOST=${NGINX_HOST}
        - NGINX_PORT=${NGINX_PORT}
    env_file:
      - .env
    networks:
      - streamcore-network

  app1:
    container_name: sc2-app1
    build: .
    env_file:
      - .env
    environment:
      - SERVER_NAME=Node-1
    networks:
      - streamcore-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  app2:
    container_name: sc2-app2
    build: .
    env_file:
      - .env
    environment:
      - SERVER_NAME=Node-2
    networks:
      - streamcore-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  app3:
    container_name: sc2-app3
    build: .
    env_file:
      - .env
    environment:
      - SERVER_NAME=Node-3
    networks:
      - streamcore-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    container_name: sc2-postgres
    image: postgres:14
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:7703"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - streamcore-network

  redis:
    container_name: sc2-redis
    image: redis
    ports:
      - "${REDIS_PORT}:7704"
    networks:
      - streamcore-network

  zookeeper:
    container_name: sc2-zookeeper
    image: wurstmeister/zookeeper
    ports:
      - "${ZOOKEEPER_PORT}:7706"
    networks:
      - streamcore-network

  kafka:
    container_name: sc2-kafka
    image: wurstmeister/kafka
    ports:
      - "${KAFKA_PORT}:7705"
    environment:
      - KAFKA_ADVERTISED_HOST_NAME=kafka
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:7706
    networks:
      - streamcore-network

  kafka-consumer:
    container_name: sc2-kafka-consumer
    build:
      context: ./kafka-consumer
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      zookeeper:
        condition: service_started
    networks:
      - streamcore-network

volumes:
  postgres_data:

networks:
  streamcore-network:
    driver: bridge
