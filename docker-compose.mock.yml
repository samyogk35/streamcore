services:
  mock-feed:
    container_name: sc2-mock-feed
    build:
      context: ./mock-feed
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_PORT=6379
      - KAFKA_PORT=9092
    networks:
      - streamcore-network

networks:
  streamcore-network:
    external: true
    name: streamcore-v2_streamcore-network
